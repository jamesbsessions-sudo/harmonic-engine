<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Harmonic Exercise Engine</title>
  <script src="/static/EP_MK1.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }
    h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }
    #status { font-size: 13px; color: #555; min-height: 20px; }
    #midi-status { font-size: 12px; color: #444; }
    #start-btn {
      padding: 10px 32px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    #start-btn:hover { background: #222; border-color: #666; }
    #start-btn:disabled { opacity: 0.3; cursor: default; }
    .chord-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .chord-btn {
      padding: 8px 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .chord-btn:hover { background: #222; border-color: #555; }
    .chord-btn.active { background: #0f2a3f; border-color: #2a6a9f; color: #88bbdd; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
    }
    .instrument-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .inst-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      user-select: none;
      transition: all 0.15s;
    }
    .inst-toggle.active { border-color: #3a7a3f; background: #0d1f10; color: #6abf72; }
    .inst-toggle.loading { border-color: #555; color: #555; }
    .inst-toggle .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #333;
    }
    .inst-toggle.active .dot { background: #6abf72; }
    .inst-toggle.loading .dot { background: #555; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    /* drum info */
    #drum-info {
      font-size: 11px;
      color: #444;
      text-align: center;
      letter-spacing: 0.05em;
      min-height: 16px;
    }
    .drum-btn {
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .drum-btn:hover:not(:disabled) { background: #222; border-color: #555; }
    .drum-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

  <h1>Harmonic Exercise Engine</h1>
  <div id="status">Loading synth...</div>
  <div id="midi-status">MIDI: waiting</div>

  <button id="start-btn" disabled>Start Audio</button>

  <div>
    <div class="section-label" style="text-align:center; margin-bottom: 10px">Instruments</div>
    <div class="instrument-row" id="instrument-row"></div>
  </div>

  <div>
    <div class="section-label" style="text-align:center; margin-bottom: 10px">Test chords</div>
    <div class="chord-row" id="chord-row"></div>
  </div>

  <div style="display:flex; flex-direction:column; align-items:center; gap:10px">
    <div class="section-label">Drums</div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center">
      <button class="drum-btn" id="drum-kick-btn" disabled>Kick</button>
      <button class="drum-btn" id="drum-snare-btn" disabled>Snare</button>
      <button class="drum-btn" id="drum-hat-btn" disabled>Hi Hat</button>
      <button class="drum-btn" id="drum-clap-btn" disabled>Clap</button>
      <button class="drum-btn" id="drum-rim-btn" disabled>Rim</button>
      <button class="drum-btn" id="drum-next-btn" disabled>Next Kit →</button>
    </div>
    <div id="drum-info">—</div>
  </div>

  <script>
  // ── Voicings ─────────────────────────────────────────────────────────────
  const CHORDS = {
    'Am7':   { notes: [45, 55, 60, 64] },
    'Fmaj9': { notes: [41, 52, 55, 60] },
    'Cmaj7': { notes: [48, 52, 55, 59] },
    'Em7':   { notes: [40, 47, 52, 55] },
    'Dmaj9': { notes: [38, 45, 50, 54] },
    'Bm7':   { notes: [35, 42, 45, 50] },
  }

  // ── Audio context ─────────────────────────────────────────────────────────
  let audioCtx = null
  let ready = false
  let activeChord = null

  // ── EP-MK1 ────────────────────────────────────────────────────────────────
  let heavyModule = null
  let epInstance = null
  let epEnabled = true

  // ── Salamander Grand ──────────────────────────────────────────────────────
  let salamander = null
  let salamanderEnabled = true
  let salamanderNotes = []

  // ── Drum state ────────────────────────────────────────────────────────────
  // pools: { Kick: [{path, features}, ...], Snare: [...], ... }
  // Each type has a shuffled queue; when exhausted, reshuffle
  const drumPools = {}
  const drumQueues = {}   // current shuffled queue per type
  const drumBuffers = {}  // decoded AudioBuffers keyed by path
  let drumIndexes = {}    // current position in queue per type

  const DRUM_SLOT_MAP = {
    'kick':  'Kick',
    'snare': 'Snare',
    'hat':   'Hi Hats',
    'clap':  'Claps',
    'rim':   'Rim',
  }

  // ── Instruments UI ────────────────────────────────────────────────────────
  const INSTRUMENTS = [
    { id: 'ep',  label: 'EP-MK1',          subtitle: 'Physical model' },
    { id: 'sal', label: 'Salamander Grand', subtitle: 'Acoustic piano' },
  ]

  // ── Load EP-MK1 WASM ──────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    if (typeof EP_MK1_Module === 'undefined') {
      setStatus('Error: EP_MK1.js failed to load')
      return
    }
    EP_MK1_Module().then(mod => {
      heavyModule = mod
      setStatus('Ready — click Start Audio')
      document.getElementById('start-btn').disabled = false
    }).catch(e => setStatus('Error loading WASM: ' + e.message))
  })

  // ── Start Audio ───────────────────────────────────────────────────────────
  document.getElementById('start-btn').onclick = async () => {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)()

      // EP-MK1
      const blockSize = 256
      const instance = new heavyModule.EP_MK1_AudioLib({
        sampleRate: audioCtx.sampleRate,
        blockSize,
        printHook: null,
        sendHook: null,
      })
      const processor = audioCtx.createScriptProcessor(
        blockSize,
        instance.getNumInputChannels(),
        Math.max(instance.getNumOutputChannels(), 1)
      )
      processor.onaudioprocess = e => instance.process(e)
      processor.connect(audioCtx.destination)
      epInstance = instance
      markInstrument('ep', 'active')

      // Salamander Grand
      markInstrument('sal', 'loading')
      Soundfont.instrument(audioCtx, 'acoustic_grand_piano', {
        soundfont: 'MusyngKite',
        nameToUrl: (name, sf, format) =>
          `https://gleitz.github.io/midi-js-soundfonts/${sf}/${name}-${format}.js`,
        format: 'mp3',
        gain: 3,
      }).then(piano => {
        salamander = piano
        markInstrument('sal', 'active')
      }).catch(e => {
        markInstrument('sal', 'error')
        console.error('Salamander load failed:', e)
      })

      ready = true
      setStatus('Playing — use MIDI keyboard or click chords')
      document.getElementById('start-btn').style.display = 'none'
      initMidi()

      // Load drum pools
      loadDrumPools()

    } catch(e) {
      setStatus('Audio error: ' + e.message)
      console.error(e)
    }
  }

  // ── Drum pool loading ─────────────────────────────────────────────────────
  async function loadDrumPools() {
    document.getElementById('drum-info').textContent = 'Loading drum pools...'
    try {
      const res = await fetch('/match-drums', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          warmth: 0.7, brightness: 0.3, roominess: 0.2,
          punch: 0.8, vintage: 0.6, pool_size: 5
        })
      })
      const data = await res.json()
      console.log('[drums] match-drums response:', JSON.stringify(data).slice(0, 300))
      const pools = data.pools
      if (!pools || typeof pools !== 'object') {
        throw new Error('match-drums returned no pools: ' + JSON.stringify(data).slice(0, 200))
      }

      // Store pools and initialise shuffled queues
      for (const [type, samples] of Object.entries(pools)) {
        if (samples.length === 0) continue
        drumPools[type] = samples.map(s => s.path)
        drumQueues[type] = shuffle([...drumPools[type]])
        drumIndexes[type] = 0
      }

      // Preload all audio buffers
      document.getElementById('drum-info').textContent = 'Preloading samples...'
      await preloadDrumBuffers()

      // Enable drum buttons
      enableDrumButtons()
      updateDrumInfo()

    } catch(e) {
      document.getElementById('drum-info').textContent = 'Drum load failed: ' + e.message
      console.error(e)
    }
  }

  async function preloadDrumBuffers() {
    const allPaths = Object.values(drumPools).flat()
    await Promise.all(allPaths.map(async path => {
      if (drumBuffers[path]) return
      try {
        const url = '/drums/' + path.replace(' ', '%20')
        const res = await fetch(url)
        const arrayBuf = await res.arrayBuffer()
        drumBuffers[path] = await audioCtx.decodeAudioData(arrayBuf)
      } catch(e) {
        console.warn('Failed to load drum sample:', path, e)
      }
    }))
  }

  function playDrumSample(path) {
    const buf = drumBuffers[path]
    if (!buf || !audioCtx) return
    const source = audioCtx.createBufferSource()
    source.buffer = buf
    source.connect(audioCtx.destination)
    source.start(audioCtx.currentTime)
  }

  // Round-robin: get next sample path for a drum type
  function nextDrumSample(type) {
    const queue = drumQueues[type]
    if (!queue || queue.length === 0) return null
    const path = queue[drumIndexes[type]]
    drumIndexes[type]++
    if (drumIndexes[type] >= queue.length) {
      // Reshuffle when exhausted
      drumQueues[type] = shuffle([...drumPools[type]])
      drumIndexes[type] = 0
    }
    return path
  }

  // Advance all drum slots to next in their queue (called per exercise)
  function nextKit() {
    for (const type of Object.keys(drumPools)) {
      nextDrumSample(type)
    }
    updateDrumInfo()
  }

  function updateDrumInfo() {
    const current = {}
    for (const [type, queue] of Object.entries(drumQueues)) {
      const idx = (drumIndexes[type] || 0) % queue.length
      const path = queue[idx]
      if (path) current[type] = path.split('/').pop().replace('.wav','').replace(/_/g,' ')
    }
    const parts = Object.entries(current).map(([t, n]) => `${t}: ${n}`)
    document.getElementById('drum-info').textContent = parts.join('  ·  ')
  }

  function enableDrumButtons() {
    const map = { kick: 'Kick', snare: 'Snare', hat: 'Hi Hats', clap: 'Claps', rim: 'Rim' }
    for (const [id, type] of Object.entries(map)) {
      const btn = document.getElementById('drum-' + id + '-btn')
      if (btn && drumPools[type]) {
        btn.disabled = false
        btn.onclick = () => {
          const path = drumQueues[type][drumIndexes[type] % drumQueues[type].length]
          if (path) playDrumSample(path)
        }
      }
    }
    const nextBtn = document.getElementById('drum-next-btn')
    if (nextBtn) {
      nextBtn.disabled = false
      nextBtn.onclick = () => nextKit()
    }
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]]
    }
    return arr
  }

  // ── Note on/off ───────────────────────────────────────────────────────────
  function noteOn(midi, velocity) {
    if (!ready) return
    velocity = velocity || 90
    if (epEnabled && epInstance) {
      epInstance.sendMidi(new Uint8Array([0x90, midi, velocity]))
    }
    if (salamanderEnabled && salamander) {
      const node = salamander.play(midi, audioCtx.currentTime, { gain: velocity / 127 * 1.5 })
      salamanderNotes.push({ midi, node })
    }
  }

  function noteOff(midi) {
    if (!ready) return
    if (epEnabled && epInstance) {
      epInstance.sendMidi(new Uint8Array([0x80, midi, 0]))
    }
    if (salamanderEnabled && salamander) {
      const idx = salamanderNotes.findIndex(n => n.midi === midi)
      if (idx !== -1) {
        try { salamanderNotes[idx].node.stop(audioCtx.currentTime + 0.5) } catch(e) {}
        salamanderNotes.splice(idx, 1)
      }
    }
  }

  // ── Web MIDI ──────────────────────────────────────────────────────────────
  function initMidi() {
    if (!navigator.requestMIDIAccess) { setMidiStatus('Web MIDI not supported'); return }
    navigator.requestMIDIAccess().then(access => {
      const inputs = Array.from(access.inputs.values())
      if (inputs.length === 0) { setMidiStatus('No MIDI device found — connect and refresh'); return }
      inputs.forEach(input => { input.onmidimessage = onMidiMessage; setMidiStatus('MIDI: ' + input.name) })
      access.onstatechange = e => {
        if (e.port.type === 'input' && e.port.state === 'connected') {
          e.port.onmidimessage = onMidiMessage
          setMidiStatus('MIDI: ' + e.port.name)
        }
      }
    }).catch(e => setMidiStatus('MIDI access denied: ' + e.message))
  }

  function onMidiMessage(msg) {
    if (!ready) return
    const cmd = msg.data[0] & 0xf0
    const note = msg.data[1]
    const vel = msg.data[2]
    if (cmd === 0x90 && vel > 0) noteOn(note, vel)
    else if (cmd === 0x80 || (cmd === 0x90 && vel === 0)) noteOff(note)
    if (epEnabled && epInstance) epInstance.sendMidi(msg.data)
  }

  // ── Chord buttons ─────────────────────────────────────────────────────────
  const row = document.getElementById('chord-row')
  Object.entries(CHORDS).forEach(([name, chord]) => {
    const btn = document.createElement('button')
    btn.className = 'chord-btn'
    btn.textContent = name
    btn.addEventListener('mousedown', () => {
      if (!ready) return
      if (activeChord) {
        activeChord.notes.forEach(n => noteOff(n))
        activeChord.btn.classList.remove('active')
      }
      chord.notes.forEach(n => noteOn(n, 90))
      activeChord = { notes: chord.notes, btn }
      btn.classList.add('active')
    })
    btn.addEventListener('mouseup', () => {
      if (!ready || !activeChord || activeChord.btn !== btn) return
      activeChord.notes.forEach(n => noteOff(n))
      btn.classList.remove('active')
      activeChord = null
    })
    row.appendChild(btn)
  })

  // ── Instrument toggles ────────────────────────────────────────────────────
  const instRow = document.getElementById('instrument-row')
  INSTRUMENTS.forEach(inst => {
    const el = document.createElement('div')
    el.className = 'inst-toggle'
    el.id = 'inst-' + inst.id
    el.innerHTML = `<div class="dot"></div><span>${inst.label}</span>`
    el.title = inst.subtitle
    el.addEventListener('click', () => {
      if (inst.id === 'ep') {
        epEnabled = !epEnabled
        el.classList.toggle('active', epEnabled)
      } else if (inst.id === 'sal') {
        if (!salamander) return
        salamanderEnabled = !salamanderEnabled
        el.classList.toggle('active', salamanderEnabled)
      }
    })
    instRow.appendChild(el)
  })

  function markInstrument(id, state) {
    const el = document.getElementById('inst-' + id)
    if (!el) return
    el.classList.remove('active', 'loading')
    if (state === 'active') el.classList.add('active')
    else if (state === 'loading') el.classList.add('loading')
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg }
  function setMidiStatus(msg) { document.getElementById('midi-status').textContent = msg }
  </script>
</body>
</html>
