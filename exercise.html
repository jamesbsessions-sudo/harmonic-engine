<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Harmonic Exercise Engine</title>
  <script src="/static/EP_MK1.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }
    h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }
    #status { font-size: 13px; color: #555; min-height: 20px; }
    #midi-status { font-size: 12px; color: #444; }
    #start-btn {
      padding: 10px 32px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    #start-btn:hover { background: #222; border-color: #666; }
    #start-btn:disabled { opacity: 0.3; cursor: default; }
    .chord-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .chord-btn {
      padding: 8px 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .chord-btn:hover { background: #222; border-color: #555; }
    .chord-btn.active { background: #0f2a3f; border-color: #2a6a9f; color: #88bbdd; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
    }
    /* instrument toggles */
    .instrument-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .inst-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      user-select: none;
      transition: all 0.15s;
    }
    .inst-toggle.active { border-color: #3a7a3f; background: #0d1f10; color: #6abf72; }
    .inst-toggle.loading { border-color: #555; color: #555; }
    .inst-toggle .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #333;
    }
    .inst-toggle.active .dot { background: #6abf72; }
    .inst-toggle.loading .dot { background: #555; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

  <h1>Harmonic Exercise Engine</h1>
  <div id="status">Loading synth...</div>
  <div id="midi-status">MIDI: waiting</div>

  <button id="start-btn" disabled>Start Audio</button>

  <div>
    <div class="section-label" style="text-align:center; margin-bottom: 10px">Instruments</div>
    <div class="instrument-row" id="instrument-row"></div>
  </div>

  <div>
    <div class="section-label" style="text-align:center; margin-bottom: 10px">Test chords</div>
    <div class="chord-row" id="chord-row"></div>
  </div>

  <script>
  // ── Voicings ─────────────────────────────────────────────────────────────
  const CHORDS = {
    'Am7':   { notes: [45, 55, 60, 64] },
    'Fmaj9': { notes: [41, 52, 55, 60] },
    'Cmaj7': { notes: [48, 52, 55, 59] },
    'Em7':   { notes: [40, 47, 52, 55] },
    'Dmaj9': { notes: [38, 45, 50, 54] },
    'Bm7':   { notes: [35, 42, 45, 50] },
  }

  // ── Audio context (shared) ────────────────────────────────────────────────
  let audioCtx = null
  let ready = false
  let activeChord = null

  // ── EP-MK1 (WASM) ─────────────────────────────────────────────────────────
  let heavyModule = null
  let epInstance = null   // has .sendMidi()
  let epEnabled = true

  // ── Salamander Grand (soundfont-player) ───────────────────────────────────
  let salamander = null         // soundfont-player instrument
  let salamanderEnabled = true
  let salamanderNotes = []      // currently held nodes (for note-off)

  // ── Instrument definitions (for toggle UI) ────────────────────────────────
  const INSTRUMENTS = [
    { id: 'ep',   label: 'EP-MK1',          subtitle: 'Physical model' },
    { id: 'sal',  label: 'Salamander Grand', subtitle: 'Acoustic piano' },
  ]

  // ── Load EP-MK1 WASM ──────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    if (typeof EP_MK1_Module === 'undefined') {
      setStatus('Error: EP_MK1.js failed to load')
      return
    }
    EP_MK1_Module().then(mod => {
      heavyModule = mod
      setStatus('Ready — click Start Audio')
      document.getElementById('start-btn').disabled = false
    }).catch(e => setStatus('Error loading WASM: ' + e.message))
  })

  // ── Start Audio ───────────────────────────────────────────────────────────
  document.getElementById('start-btn').onclick = () => {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)()

      // — EP-MK1 —
      const blockSize = 256
      const instance = new heavyModule.EP_MK1_AudioLib({
        sampleRate: audioCtx.sampleRate,
        blockSize,
        printHook: null,
        sendHook: null,
      })
      const processor = audioCtx.createScriptProcessor(
        blockSize,
        instance.getNumInputChannels(),
        Math.max(instance.getNumOutputChannels(), 1)
      )
      processor.onaudioprocess = e => instance.process(e)
      processor.connect(audioCtx.destination)
      epInstance = instance
      markInstrument('ep', 'active')

      // — Salamander Grand —
      markInstrument('sal', 'loading')
      Soundfont.instrument(audioCtx, 'acoustic_grand_piano', {
        soundfont: 'MusyngKite',
        nameToUrl: (name, sf, format) =>
          `https://gleitz.github.io/midi-js-soundfonts/${sf}/${name}-${format}.js`,
        format: 'mp3',
        gain: 3,
      }).then(piano => {
        salamander = piano
        markInstrument('sal', 'active')
        setStatus('Playing — use MIDI keyboard or click chords')
      }).catch(e => {
        console.error('Salamander load failed:', e)
        markInstrument('sal', 'error')
        setStatus('Piano failed to load — EP-MK1 only')
      })

      ready = true
      setStatus('EP ready, piano loading...')
      document.getElementById('start-btn').style.display = 'none'
      initMidi()
    } catch(e) {
      setStatus('Audio error: ' + e.message)
      console.error(e)
    }
  }

  // ── Note on/off ───────────────────────────────────────────────────────────
  function noteOn(midi, velocity) {
    if (!ready) return
    velocity = velocity || 90

    if (epEnabled && epInstance) {
      // EP-MK1: send raw MIDI — assign each note to its own channel for poly
      epInstance.sendMidi(new Uint8Array([0x90, midi, velocity]))
    }

    if (salamanderEnabled && salamander) {
      const node = salamander.play(midi, audioCtx.currentTime, { gain: velocity / 127 * 1.5 })
      salamanderNotes.push({ midi, node })
    }
  }

  function noteOff(midi) {
    if (!ready) return

    if (epEnabled && epInstance) {
      epInstance.sendMidi(new Uint8Array([0x80, midi, 0]))
    }

    if (salamanderEnabled && salamander) {
      const idx = salamanderNotes.findIndex(n => n.midi === midi)
      if (idx !== -1) {
        try { salamanderNotes[idx].node.stop(audioCtx.currentTime + 0.5) } catch(e) {}
        salamanderNotes.splice(idx, 1)
      }
    }
  }

  // ── Web MIDI ──────────────────────────────────────────────────────────────
  function initMidi() {
    if (!navigator.requestMIDIAccess) {
      setMidiStatus('Web MIDI not supported')
      return
    }
    navigator.requestMIDIAccess().then(access => {
      const inputs = Array.from(access.inputs.values())
      if (inputs.length === 0) {
        setMidiStatus('No MIDI device found — connect keyboard and refresh')
        return
      }
      inputs.forEach(input => {
        input.onmidimessage = onMidiMessage
        setMidiStatus('MIDI: ' + input.name)
      })
      access.onstatechange = e => {
        if (e.port.type === 'input' && e.port.state === 'connected') {
          e.port.onmidimessage = onMidiMessage
          setMidiStatus('MIDI: ' + e.port.name)
        }
      }
    }).catch(e => setMidiStatus('MIDI access denied: ' + e.message))
  }

  function onMidiMessage(msg) {
    if (!ready) return
    const cmd = msg.data[0] & 0xf0
    const note = msg.data[1]
    const vel = msg.data[2]
    if (cmd === 0x90 && vel > 0) noteOn(note, vel)
    else if (cmd === 0x80 || (cmd === 0x90 && vel === 0)) noteOff(note)
    // pass everything to EP-MK1 for pitch bend, mod etc
    if (epEnabled && epInstance) epInstance.sendMidi(msg.data)
  }

  // ── Chord buttons ─────────────────────────────────────────────────────────
  const row = document.getElementById('chord-row')
  Object.entries(CHORDS).forEach(([name, chord]) => {
    const btn = document.createElement('button')
    btn.className = 'chord-btn'
    btn.textContent = name
    btn.addEventListener('mousedown', () => {
      if (!ready) return
      if (activeChord) {
        activeChord.notes.forEach(n => noteOff(n))
        activeChord.btn.classList.remove('active')
      }
      chord.notes.forEach((n, i) => noteOn(n, 90))
      activeChord = { notes: chord.notes, btn }
      btn.classList.add('active')
    })
    btn.addEventListener('mouseup', () => {
      if (!ready || !activeChord || activeChord.btn !== btn) return
      activeChord.notes.forEach(n => noteOff(n))
      btn.classList.remove('active')
      activeChord = null
    })
    row.appendChild(btn)
  })

  // ── Instrument toggles ────────────────────────────────────────────────────
  const instRow = document.getElementById('instrument-row')
  INSTRUMENTS.forEach(inst => {
    const el = document.createElement('div')
    el.className = 'inst-toggle'
    el.id = 'inst-' + inst.id
    el.innerHTML = `<div class="dot"></div><span>${inst.label}</span>`
    el.title = inst.subtitle
    el.addEventListener('click', () => {
      if (inst.id === 'ep') {
        epEnabled = !epEnabled
        el.classList.toggle('active', epEnabled)
      } else if (inst.id === 'sal') {
        if (!salamander) return
        salamanderEnabled = !salamanderEnabled
        el.classList.toggle('active', salamanderEnabled)
      }
    })
    instRow.appendChild(el)
  })

  function markInstrument(id, state) {
    const el = document.getElementById('inst-' + id)
    if (!el) return
    el.classList.remove('active', 'loading')
    if (state === 'active') el.classList.add('active')
    else if (state === 'loading') el.classList.add('loading')
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg }
  function setMidiStatus(msg) { document.getElementById('midi-status').textContent = msg }
  </script>
</body>
</html>
